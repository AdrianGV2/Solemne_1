name: CI/CD Pipeline

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio [1]
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Instala uv, el gestor de paquetes de alto rendimiento [2]
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      # 3. Configura el entorno de Python 3.11 [2]
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 4. Instala dependencias necesarias sin intentar construir el proyecto como paquete
      # Esto evita el error "Multiple top-level modules discovered"
      - name: Install dependencies
        run: |
          uv pip install --system fastapi uvicorn pytest httpx

      # 5. Ejecuta las pruebas automáticas definidas en test_main.py [3]
      - name: Run tests
        run: pytest

      # 6. Inicia sesión en el registro de contenedores de GitHub
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7. Construye y sube la imagen de Docker con el formato de etiqueta correcto
      # Esto resuelve el error "invalid reference format"
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
